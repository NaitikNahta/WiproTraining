<div class="container">
  <h1>Event Management Portal</h1>
  <p class="subtitle">Upcoming Events</p>

  <table>
    <thead>
      <tr>
        <th>Event Name</th>
        <th>Date</th>
        <th>Ticket Price</th>
        <th>Category</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let event of events"
          [appHighlight]="event.price"
          class="event-row">
        <td>{{ event.name }}</td>
        <td>{{ event.date | date:'dd-MMM-yyyy' }}</td>
        <td>{{ event.price | priceFormat }}</td>
        <td>{{ event.category }}</td>
      </tr>
    </tbody>
  </table>

  <p class="legend">⭐ Gold highlighted rows are premium events (above ₹2,000)</p>
</div>
