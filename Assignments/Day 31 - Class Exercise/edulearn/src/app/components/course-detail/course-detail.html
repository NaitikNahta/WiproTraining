@if (!editableCourse) {
  <p style="color: #888; margin-top: 48px;">Click "View Details" to see a course.</p>
}

@if (editableCourse) {
  <div style="border: 1px solid #ccc; padding: 24px; border-radius: 8px;">
    <h2>Course Details</h2>

    <label><strong>Title (editable):</strong></label>
    <input
      type="text"
      [(ngModel)]="editableCourse.title"
      (ngModelChange)="onTitleChange()"
      style="display: block; margin: 8px 0 16px; padding: 8px; width: 100%;"
    />

    <p><strong>Instructor:</strong> {{ editableCourse.instructor }}</p>
    <p><strong>Duration:</strong> {{ editableCourse.duration }}</p>

    <p style="margin-top: 16px; color: #555;">
      Live title preview: <em>{{ editableCourse.title }}</em>
    </p>
  </div>
}
